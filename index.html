<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Finance United – Bingo</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --brand:#7A0019;
  --fg:#0f1c2b;
  --line:#e5e7eb;
  --bg:#ffffff;
}

* { box-sizing:border-box; }

body {
  margin:0;
  font-family:'Nunito', Arial, sans-serif;
  background:var(--bg);
  color:var(--fg);
}

main {
  max-width:980px;
  margin:14px auto;
  padding:0 14px 44px;
}

/* HEADER */
.header {
  display:flex;
  flex-direction:column;
  gap:8px;
  margin:10px 0 14px;
}

/* ✅ use an image file instead of base64 */
.logo {
  height:64px;
  width:auto;
}

.welcome {
  font-size:1.35rem;
  font-weight:900;
  color:var(--brand);
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

@media (max-width:700px){
  .grid { grid-template-columns:1fr; }
}

.cell {
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
  background:#fff;
  display:flex;
  flex-direction:column;
}

.q {
  font-weight:900;
  margin-bottom:8px;
}

/* ✅ textarea for mobile */
textarea.answer {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px dashed var(--line);
  font-size:1rem;
  line-height:1.35;
  resize:none;
  min-height:2.8em;
}

textarea.answer:disabled {
  background:#f6f7f9;
  color:#566579;
}

/* ACTIONS */
.actions {
  margin-top:14px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button {
  padding:12px 16px;
  border-radius:12px;
  font-weight:900;
  border:none;
  cursor:pointer;
}

.primary {
  background:var(--brand);
  color:#fff;
}

.secondary {
  background:#fff;
  border:1px solid var(--line);
}

button:disabled {
  opacity:.5;
  cursor:not-allowed;
}

/* LOCKED */
.locked-banner {
  background:var(--brand);
  color:#fff;
  font-weight:900;
  text-align:center;
  padding:14px;
  border-radius:14px;
  margin:10px 0;
}

/* OVERLAYS */
.overlay {
  position:fixed;
  inset:0;
  background:rgba(122,0,25,.97);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.hidden { display:none; }

.panel {
  background:#fff;
  color:#111;
  border-radius:16px;
  padding:22px;
  max-width:420px;
  width:100%;
  text-align:center;
}

.panel input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--line);
  font-size:1rem;
}

.count {
  font-size:5rem;
  font-weight:900;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="introOverlay" class="overlay">
  <button id="tapStartBtn" class="primary">Tap to start</button>
</div>

<!-- NAME -->
<div id="nameOverlay" class="overlay hidden">
  <div class="panel">
    <h2>Welcome to the Bingo Game!</h2>
    <input id="participantName" placeholder="Your name"/>
    <br><br>
    <button id="nameContinueBtn" class="primary">Continue</button>
  </div>
</div>

<!-- COUNTDOWN -->
<div id="countOverlay" class="overlay hidden">
  <div id="countNum" class="count">3</div>
</div>

<!-- ADMIN -->
<div id="adminChoiceOverlay" class="overlay hidden">
  <div class="panel">
    <h3>Admin action</h3>
    <button id="choiceUnlock" class="primary">Unlock</button>
    <button id="choiceRestart" class="secondary">Start again</button>
  </div>
</div>

<main>
  <div class="header">
    <!-- ✅ put your logo file next to index.html -->
