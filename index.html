<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Finance United – Bingo</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --brand:#7A0019; --fg:#0f1c2b; --line:#e5e7eb; --bg:#ffffff; }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:'Nunito', Arial, sans-serif; background:var(--bg); color:var(--fg); }
    main{ max-width:980px; margin:14px auto; padding:0 14px 44px; }

    .header{ display:flex; flex-direction:column; align-items:flex-start; gap:8px; margin:10px 0 14px; }
    .logo{ height:64px; width:auto; display:block; }
    .welcome{ font-size:1.35rem; font-weight:900; color:var(--brand); }

    .locked-banner{ background:var(--brand); color:#fff; font-size:1.45rem; font-weight:900; text-align:center; padding:14px; border-radius:14px; margin:10px 0 14px; letter-spacing:0.06em; box-shadow:0 6px 18px rgba(0,0,0,.18); }

    .grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .cell{ border:1px solid var(--line); border-radius:12px; padding:12px; min-height:160px; display:flex; flex-direction:column; background:#fff; }
    .q{ font-weight:900; margin-bottom:10px; line-height:1.25rem; }
    input.answer{ width:100%; padding:10px; border-radius:10px; border:1px dashed var(--line); font-size:1rem; }
    input.answer:disabled{ background:#f6f7f9; color:#566579; }

    .actions{ margin-top:14px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    button{ padding:12px 16px; border-radius:12px; font-weight:900; font-size:1rem; cursor:pointer; border:none; }
    .primary{ background:var(--brand); color:#fff; }
    .secondary{ background:#fff; border:1px solid var(--line); color:var(--fg); }
    button:disabled{ opacity:.5; cursor:not-allowed; }

    .overlay{ position:fixed; inset:0; background:rgba(122,0,25,0.97); color:#fff; display:flex; justify-content:center; align-items:center; z-index:1000; padding:18px; }
    .panel{ background:#fff; color:#000; border-radius:16px; padding:22px; max-width:420px; width:100%; box-shadow:0 12px 28px rgba(0,0,0,.25); text-align:center; }
    .panel h2{ margin:0 0 8px 0; }
    .panel p{ margin:0 0 14px 0; color:#444; line-height:1.35; }
    .panel input{ width:100%; padding:12px; border-radius:10px; border:1px solid var(--line); font-size:1rem; }
    .hidden{ display:none; }
    .count{ font-size:5rem; font-weight:900; text-align:center; color:#fff; }

    @media (max-width: 520px){ .count{ font-size:4.2rem; } .logo{ height:58px; } }
  </style>
</head>
<body>

  <div id="introOverlay" class="overlay">
    <button id="tapStartBtn" class="primary" type="button">Tap to start</button>
  </div>

  <div id="nameOverlay" class="overlay hidden">
    <div class="panel">
      <h2>Welcome to the Bingo Game!</h2>
      <p>Please enter your name. We’ll personalise your card.</p>
      <input id="participantName" type="text" maxlength="50" placeholder="Your name" />
      <div style="height:12px"></div>
      <button id="nameContinueBtn" class="primary" type="button">Continue</button>
    </div>
  </div>

  <div id="countOverlay" class="overlay hidden">
    <div id="countNum" class="count">3</div>
  </div>

  <!-- Admin choice overlay (only after correct passcode on a locked card) -->
  <div id="adminChoiceOverlay" class="overlay hidden">
    <div class="panel">
      <h2>Admin Action</h2>
      <p>What would you like to do?</p>
      <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap">
        <button id="choiceUnlock" class="primary" type="button">Unlock</button>
        <button id="choiceRestart" class="secondary" type="button">Start again</button>
      </div>
    </div>
  </div>

  <main>
    <div class="header">
      <img class="logo" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAYwAAAGdCAYAAAABs0R0AAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAAEnQAABJ0Ad5mH3gAAMnJSURBVHhe7J11nBzHnbef6u7hWeYVg0UW2JJsWbZsmdmxnThmx0mcOHGSu1z47oJvcg7TJRcwJE7MGDOzxQwWMy/TMHR3vX/07Fo7Wu3Orla49Xw+bWunanoa61vwAyGllCgUCoVC0QNa9gcKhUKhUHSFEgyFQqFQ5IQSDIVCoVDkhBIMhUKhUOSEEgyFQqFQ5IQSDIVCoVDkhBIMhUKhUOSEEgyFQqFQ5IQSDIVCoVDkhBIMhUKhUOSEEgyFQqFQ5IQSDIVCoVDkhBIMhUKhUOSEEgyFQqFQ5IQSDIVCoVDkhBIMhUKhUOSEUAmUFCckto2dMuFwPd4ChNuF0FSfSzFwUIKhOL6wbOx4olshkFKS2rWP6LK12LEECJFd5ZCQto2RFyBw2iTcgyqyizujaQivB6ErYVEc/yjBUBxzWPE4JFKdPxQCaVkkN+0gunQtZjTede9eCGTaJLF2M5ElHyKTqX4XDKRE83kIzJiCb/xohK7R1WskbRs96CM4YwreUUMQWlY9IRBeN5rXu//XFIpjFiUYimMCO5HEjsSwIzHC85eT2LQD7M6NK2mT2OqNxFZvRKbN7oUgnkRLprCzP+8nNMD2esDrzi76CCnR3Aa+UyfgP/kkMPSPRkZSIgwd74TRBGdMcUYhmkAvyEO4jOw9KRTHBEowFEcMs7kVKxLv/GFGCOKr1hNZ8iHJuiZiSz7EqmvqXC8z1UQyjZY26emhtZE91jlUBKDRjWhl6thuF7gNRBcCZ1SXEzhtMprfi57nJ//saXjGjAD9I3ERQqDl+TEK87O/rlAcUZRgKA4bdiRGur4JaUvstjChdxcS37ij8/pD+xTSuq0ktuwACSJlgux6bCAz2/GEyGzZCABNx3ZpzvSUpuE9+SRn+krXkVIipUToGv6TR5N/zgxEnh+hCVyVZWh+NZWlOLIowVD0D1KS3L4bK+osMstUmtjSNUQWrMCKJbBjCeIrN2C2hQ7oaUspwbLRJMgjMDI41vhIUARSE5C9QC4lenEh/inj0LxutKCf4Kxp+E8Z70xfSYme58czfHDn7ykU/YwSDMUhkdy5B7OhlfTuWtremENyTx1oGtK0SG3bQ2rnXsdSCMfUtTvUg9j1SKQDTXOukW3jHjkEz/BBHQvunqFVFFw8C9egCozyYjxDqrK/rVAcMkowFD3TPjWiaaQbmklu2oG0bKyWEKG3FxBbvxWrJURi/dZO003tjZ96wPoX0cU1FbqOZ/wo9MIg/oljKDjvDLSCIMLQ8Y0fhVaY59yPLtZRFIpcUYKhOCjSspCJFNGV65GRGHYyRWzpWsLzl2NF49hpk/TWXZBMHZdrCyca7VNbwufFNXIIwtAzC+mn4TtlHHpxAYEp4xFet+N4qOvZu1AoukUJhqIzlu0IRSpNdMVaIgtXE357Aen6JkBg1jVDSxt2Rh66n2RSHA32X2TXEVBahF5SgFFeTP75M/GMGoKruozgKRMcU19dV46FipxQgqFwwmgkU2DaxNduIrFlF6k9dYTeWUBi8y6oa+oYPRwJc1VF/yIy5r8CoLwYLeDDM6yKvPNm4q4uwzd2BN5xIxGGjnC7oCuHSIVCCcYARkqsWBzSFontu4kuW4tV30xk/grim7ZjJ9KIplaklFhKIk4Y9HZ7LE2DkkI0rwvfhNEEZkxBLy8i7/TJuAZXobkNhM97gEWbYmCjBGOAYUdiWIkkZl0TkblLSdU2EV+zmdjyNY5IRGKQcYxTQnFioyPQAOk2kAGfE+7k9Cl4x43EXV1GcNY0jNIidJ8HLeDP/rpiAKIEY4BgR2Ok99bT9u5Cktv3ktpVS3ThCqxYHJFIo       <div class="welcome">Welcome, <span id="welcomeName"></span></div>
    </div>

    <div id="lockedBanner" class="locked-banner hidden">🔒 CARD LOCKED · <span id="lockedTime"></span></div>

    <div id="grid" class="grid"></div>

    <div class="actions">
      <button id="lockBtn" class="primary" type="button" disabled>Lock my card ✅</button>
      <button id="unlockBtn" class="secondary hidden" type="button">Admin for Unlock</button>
    </div>
  </main>

<script>
  const ADMIN_PASS = 'FU2026';
  const QUESTIONS_TXT = 'questions.txt';
  const LS_KEY = 'FU_BINGO_LOCKED_V3';
  const FALLBACK_QUESTIONS = ["Find someone who is part of the NEEU market", "Find someone who is part of the SEU market", "Find someone who is part for the SAM market", "Find someone who is part of the NAM market", "Find someone who has lived in more than 3 countries", "Find someone who speaks more than 3 languages", "Find someone who has relocated for Puratos", "Find someone who visited Belgium more than 5 times", "Find someone who can cook a traditional dish from his/her country", "Find someone who traveled to more than 20 countries", "Find someone who loves white chocolate", "Find someone who joined Puratos less than 1 year ago", "Find someone who works for Puratos for more than 20 years", "Find someone who changed function within Puratos over the last 3 years", "Find someone who attended a Finance United before", "Find someone who plays piano", "Find someone who can dance the Macarena", "Find someone who loves soccer", "Find someone who ran a marathon", "Find someone who can juggle (at least with two balls)", "Find someone who plays an uncommon instrument", "Find someone who has a blog/podcast", "Find someone who speaks Spanish", "Find someone who can whistle loud", "Find someone who is a coffee addict", "Find someone who has a dog", "Find someone who has a tattoo", "Find someone who loves spicy food", "Find someone who is a hiking fan", "Find someone who likes baking", "Find someone who loves karaoke", "Find someone who likes science fiction movies", "Find someone who has a funny childhood nickname", "Find someone who 's favorite color is green", "Find someone who has 3 children or more", "Find someone who plays guitar", "Find someone who is sea sick", "Find someone who is afraid of spiders", "Find someone who has more than 2 siblings", "Find someone who has fear of heights", "Find someone who is a good skier", "Find someone who has already won over 500 EUR in a lottery game", "Find someone who has already cheated on an exam", "Find someone who is a chess expert", "Find someone who is a man and has already dressed up as a woman", "Find someone who was born in May", "Find someone who loves roller coasters", "Find someone who has broken a bone", "Find someone who is a vegetarian"];

  let appState = {
    participantName: '',
    questions: [],
    answers: Array(9).fill(''),
    locked: false,
    lockedAt: ''
  };

  const $ = (id) => document.getElementById(id);

  function saveState(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(appState)); }catch(e){} }
  function clearState(){ try{ localStorage.removeItem(LS_KEY); }catch(e){} }
  function loadState(){
    try{
      const raw = localStorage.getItem(LS_KEY);
      if(!raw) return false;
      const s = JSON.parse(raw);
      if(s && typeof s === 'object') appState = Object.assign(appState, s);
      return true;
    }catch(e){ return false; }
  }

  function formatTime(iso){
    if(!iso) return '';
    const d = new Date(iso);
    return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  }

  async function loadQuestions(){
    if(window.location.protocol === 'file:') return FALLBACK_QUESTIONS;
    try{
      const res = await fetch(QUESTIONS_TXT, {cache:'no-store'});
      if(!res.ok) throw new Error('missing');
      const txt = await res.text();
      const lines = txt.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
      if(lines.length < 9) throw new Error('not enough');
      return lines;
    }catch(e){
      return FALLBACK_QUESTIONS;
    }
  }

  function pickCardQuestions(allQ){
    if(!allQ || allQ.length < 9) allQ = FALLBACK_QUESTIONS;

    const first5 = allQ.slice(0,5);
    const rest = allQ.slice(5);
    const mustPick = first5[Math.floor(Math.random() * first5.length)];

    const pool = rest.slice();
    for(let i=pool.length-1; i>0; i--){
      const j = Math.floor(Math.random()*(i+1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    const chosen = pool.slice(0,8);

    const nine = [mustPick, ...chosen];
    for(let i=nine.length-1; i>0; i--){
      const j = Math.floor(Math.random()*(i+1));
      [nine[i], nine[j]] = [nine[j], nine[i]];
    }
    return nine;
  }

  function renderHeader(){
    $('welcomeName').textContent = appState.participantName ? (appState.participantName + '!') : '';
  }

  function renderGrid(){
    const grid = $('grid');
    grid.innerHTML = '';

    appState.questions.forEach((q, idx) => {
      const cell = document.createElement('div');
      cell.className = 'cell';

      const qEl = document.createElement('div');
      qEl.className = 'q';
      qEl.textContent = q;

      const input = document.createElement('input');
      input.className = 'answer';
      input.type = 'text';
      input.maxLength = 60;
      input.placeholder = 'Type a name';
      input.value = appState.answers[idx] || '';
      input.disabled = !!appState.locked;
      input.addEventListener('input', () => {
        appState.answers[idx] = input.value;
        saveState();
        checkLock();
      });

      cell.appendChild(qEl);
      cell.appendChild(input);
      grid.appendChild(cell);
    });

    checkLock();
  }

  function renderLockedUI(){
    if(appState.locked){
      $('lockedBanner').classList.remove('hidden');
      $('lockedTime').textContent = formatTime(appState.lockedAt);
      $('lockBtn').classList.add('hidden');
      $('unlockBtn').classList.remove('hidden');
    }else{
      $('lockedBanner').classList.add('hidden');
      $('lockBtn').classList.remove('hidden');
      $('unlockBtn').classList.add('hidden');
    }
  }

  function checkLock(){
    const ok = appState.answers.every(a => (a||'').trim().length >= 2);
    $('lockBtn').disabled = appState.locked || !ok;
  }

  function showIntro(){
    $('introOverlay').classList.remove('hidden');
    $('nameOverlay').classList.add('hidden');
    $('countOverlay').classList.add('hidden');
    $('adminChoiceOverlay').classList.add('hidden');
  }
  function showName(){
    $('introOverlay').classList.add('hidden');
    $('nameOverlay').classList.remove('hidden');
    $('countOverlay').classList.add('hidden');
    $('adminChoiceOverlay').classList.add('hidden');
    $('participantName').focus();
  }
  function showCount(){
    $('nameOverlay').classList.add('hidden');
    $('countOverlay').classList.remove('hidden');
  }
  function hideOverlays(){
    $('introOverlay').classList.add('hidden');
    $('nameOverlay').classList.add('hidden');
    $('countOverlay').classList.add('hidden');
    $('adminChoiceOverlay').classList.add('hidden');
  }

  async function createCard(){
    const qs = await loadQuestions();
    appState.questions = pickCardQuestions(qs);
    appState.answers = Array(9).fill('');
    appState.locked = false;
    appState.lockedAt = '';
    saveState();
    renderHeader();
    renderGrid();
    renderLockedUI();
  }

  function startCountdown(){
    let n = 3;
    $('countNum').textContent = n;
    showCount();
    const t = setInterval(async () => {
      n--;
      if(n > 0){
        $('countNum').textContent = n;
      } else {
        clearInterval(t);
        hideOverlays();
        await createCard();
      }
    }, 1000);
  }

  function lockCard(){
    if($('lockBtn').disabled) {
      alert('Please fill in all names before locking the card.');
      return;
    }
    appState.locked = true;
    appState.lockedAt = new Date().toISOString();
    saveState();
    renderLockedUI();
    renderGrid();
  }

  function requestAdminAction(){
    const code = prompt('Admin passcode?');
    if(code === ADMIN_PASS){
      // Show choice overlay with two options
      $('adminChoiceOverlay').classList.remove('hidden');
    } else if(code !== null){
      alert('Wrong passcode.');
    }
  }

  function adminDoUnlock(){
    $('adminChoiceOverlay').classList.add('hidden');
    appState.locked = false;
    appState.lockedAt = '';
    saveState();
    renderLockedUI();
    renderGrid();
  }

  function adminStartAgain(){
    $('adminChoiceOverlay').classList.add('hidden');
    // Clear state and return to intro
    appState = { participantName:'', questions:[], answers:Array(9).fill(''), locked:false, lockedAt:'' };
    clearState();
    // Also clear UI
    $('grid').innerHTML = '';
    $('welcomeName').textContent = '';
    $('lockedBanner').classList.add('hidden');
    showIntro();
  }

  window.addEventListener('DOMContentLoaded', () => {
    const hadState = loadState();
    if(hadState && appState.questions && appState.questions.length === 9){
      hideOverlays();
      renderHeader();
      renderGrid();
      renderLockedUI();
    } else {
      showIntro();
    }

    $('tapStartBtn').addEventListener('click', showName);
    $('nameContinueBtn').addEventListener('click', () => {
      const name = ($('participantName').value || '').trim();
      if(name.length < 2){
        alert('Please enter your name.');
        return;
      }
      appState.participantName = name;
      saveState();
      startCountdown();
    });

    $('participantName').addEventListener('keydown', (e) => {
      if(e.key === 'Enter') $('nameContinueBtn').click();
    });

    $('lockBtn').addEventListener('click', lockCard);
    $('unlockBtn').addEventListener('click', requestAdminAction);

    $('choiceUnlock').addEventListener('click', adminDoUnlock);
    $('choiceRestart').addEventListener('click', adminStartAgain);
  });
</script>
</body>
</html>
