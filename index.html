<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Finance United – Bingo</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root { --brand:#7A0019; --fg:#0f1c2b; --line:#e5e7eb; --bg:#ffffff; }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:'Nunito', Arial, sans-serif; background:var(--bg); color:var(--fg); }
    main{ max-width:980px; margin:14px auto; padding:0 14px 44px; }

    .header{ display:flex; flex-direction:column; align-items:flex-start; gap:8px; margin:10px 0 14px; }

    .logo{
      height:64px;
      width:auto;
      display:block;
    }

    .welcome{ font-size:1.35rem; font-weight:900; color:var(--brand); }

    .grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }

    .cell{
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
      min-height:160px;
      background:#fff;
      display:flex;
      flex-direction:column;
    }

    .q{ font-weight:900; margin-bottom:10px; }

    input.answer{
      padding:10px;
      border-radius:10px;
      border:1px dashed var(--line);
      font-size:1rem;
    }

    .actions{ margin-top:14px; }

    button{
      padding:12px 16px;
      border-radius:12px;
      font-weight:900;
      font-size:1rem;
      cursor:pointer;
      border:none;
      background:var(--brand);
      color:#fff;
    }

    @media (max-width:520px){
      .logo{ height:58px; }
    }
  </style>
</head>

<body>

<main>

  <div class="header">

    <!-- INLINE SVG LOGO (WORKS EVERYWHERE) -->
    <svg class="logo"
         viewBox="0 0 400 400"
         xmlns="http://www.w3.org/2000/svg"
         role="img"
         aria-label="Puratos Finance Seminar 2026">

      <circle cx="200" cy="200" r="200" fill="#C8102E"/>

      <text x="200" y="85" text-anchor="middle"
            fill="white"
            font-size="36"
            font-weight="700"
            font-family="Arial, Helvetica, sans-serif">
        puratos
      </text>

      <text x="200" y="115" text-anchor="middle"
            fill="white"
            font-size="14"
            font-family="Arial, Helvetica, sans-serif">
        Food Innovation for Good
      </text>

      <!-- star -->
      <polygon points="125,155 132,173 151,173 135,184 141,202
                       125,191 109,202 115,184 99,173 118,173"
               fill="white"/>

      <text x="200" y="215" text-anchor="middle"
            fill="white"
            font-size="64"
            font-weight="900"
            font-family="Arial, Helvetica, sans-serif">
        FINANCE
      </text>

      <text x="200" y="265" text-anchor="middle"
            fill="white"
            font-size="36"
            font-weight="700"
            font-family="Arial, Helvetica, sans-serif">
        SEMINAR
      </text>

      <text x="200" y="315" text-anchor="middle"
            fill="white"
            font-size="36"
            font-weight="700"
            font-family="Arial, Helvetica, sans-serif">
        2026
      </text>
    </svg>

    <div class="welcome">Welcome, <span id="welcomeName"></span></div>
  </div>

  <!-- SAMPLE GRID (your full logic can plug in here) -->
  <div class="grid">
    <div class="cell"><div class="q">Find someone who speaks Spanish</div><input class="answer" placeholder="Type a name"></div>
    <div class="cell"><div class="q">Find someone who ran a marathon</div><input class="answer" placeholder="Type a name"></div>
    <div class="cell"><div class="q">Find someone born in May</div><input class="answer" placeholder="Type a name"></div>
  </div>

  <div class="actions">
    <button>Lock my card ✅</button>
  </div>

</main>

<script>
  // Dummy line so you see the welcome text
  document.getElementById("welcomeName").textContent = "Gencer!";
</script>

</body>
</html>
