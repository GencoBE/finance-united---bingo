<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Finance United – Bingo</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root { --brand:#7A0019; --fg:#0f1c2b; --line:#e5e7eb; --bg:#ffffff; }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:'Nunito', Arial, sans-serif; background:var(--bg); color:var(--fg); }
    main{ max-width:980px; margin:14px auto; padding:0 14px 44px; }

    .header{ display:flex; flex-direction:column; align-items:flex-start; gap:8px; margin:10px 0 14px; }
    .logo{ height:64px; width:auto; display:block; }
    .welcome{ font-size:1.35rem; font-weight:900; color:var(--brand); }

    .locked-banner{
      background:var(--brand); color:#fff; font-size:1.45rem; font-weight:900;
      text-align:center; padding:14px; border-radius:14px; margin:10px 0 14px;
      letter-spacing:.06em; box-shadow:0 6px 18px rgba(0,0,0,.18);
    }

    .grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .cell{ border:1px solid var(--line); border-radius:12px; padding:12px; min-height:160px; background:#fff; display:flex; flex-direction:column; }
    .q{ font-weight:900; margin-bottom:10px; }
    input.answer{ padding:10px; border-radius:10px; border:1px dashed var(--line); }

    .actions{ margin-top:14px; display:flex; gap:10px; }
    button{ padding:12px 16px; border-radius:12px; font-weight:900; cursor:pointer; border:none; }
    .primary{ background:var(--brand); color:#fff; }
    .secondary{ background:#fff; border:1px solid var(--line); color:var(--fg); }

    .overlay{ position:fixed; inset:0; background:rgba(122,0,25,.97); color:#fff;
      display:flex; justify-content:center; align-items:center; z-index:1000; }
    .hidden{ display:none; }
  </style>
</head>

<body>

<main>
  <div class="header">
    <img class="logo"
      src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAYwAAAGdCAYAAAABs0R0AAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAAEnQAABJ0Ad5mH3gAAMnJ...AAAASUVORK5CYII="
      alt="Puratos Finance Seminar 2026">
    <div class="welcome">Welcome, <span id="welcomeName"></span></div>
  </div>

  <div id="grid" class="grid"></div>

  <div class="actions">
    <button id="lockBtn" class="primary">Lock my card ✅</button>
  </div>
</main>

<script>
  // Minimal sanity JS – your full logic can stay as-is
  document.getElementById("welcomeName").textContent = "Guest!";
</script>

</body>
</html>
